schema_version: "1"
scenario: {id: CN_A_SHARE_T1_ENGINE, version: "1.0", description: "A-share board lot and T1 profile"}
runtime: {mode: BACKTEST, start_time: "2026-01-05T01:30:00Z", end_time: "2026-01-05T02:00:00Z", base_currency: CNY}
market: {profile: CN_A_SHARE_CASH}
reference:
  calendars:
    - calendar_id: CN_XSHG
      venue: XSHG
      timezone: Asia/Shanghai
      sessions:
        - {name: morning, opens_at: "09:30:00", closes_at: "11:30:00", session_type: CONTINUOUS}
        - {name: afternoon, opens_at: "13:00:00", closes_at: "15:00:00", session_type: CONTINUOUS}
      holidays: []
  instruments:
    - instrument_id: "600000.XSHG"
      asset_class: EQUITY
      board: MAIN
      st_status: false
      timezone: Asia/Shanghai
      trading_calendar_id: CN_XSHG
      price_precision: 2
      quantity_precision: 0
      price_increment: "0.01"
      quantity_increment: "100"
      lot_size: "100"
data:
  bars:
    - {instrument_id: "600000.XSHG", ts_event: "2026-01-05T01:31:00Z", ts_init: "2026-01-05T01:31:00Z", sequence: 1, open: "10.00", high: "10.10", low: "9.90", close: "10.00", volume: "1000"}
    - {instrument_id: "600000.XSHG", ts_event: "2026-01-05T01:32:00Z", ts_init: "2026-01-05T01:32:00Z", sequence: 2, open: "10.00", high: "10.10", low: "9.90", close: "10.00", volume: "1000"}
actions:
  - action_id: BUY_BOARD_LOT
    trigger: {type: ON_BAR_SEQUENCE, sequence: 1}
    command: {type: SUBMIT_ORDER, instrument_id: "600000.XSHG", side: BUY, order_type: MARKET, quantity: "100", position_effect: AUTO}
expectations:
  - {assertion_id: A_SHARE_FILLED, fact: ORDER, selector: {action_id: BUY_BOARD_LOT}, field: status, operator: EQUALS, expected: FILLED}
  - {assertion_id: A_SHARE_PROFILE, fact: PROFILE_TIMELINE, selector: {profile_id: CN_A_SHARE_CASH}, operator: EXISTS}
  - {assertion_id: T1_ASSET_UNAVAILABLE, fact: POSITION, selector: {instrument_id: "600000.XSHG"}, field: available_quantity, operator: DECIMAL_EQUALS, expected: "0"}
