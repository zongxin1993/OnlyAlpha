schema_version: "1"
scenario: {id: GENERIC_CRYPTO_SPOT_ENGINE, version: "1.0", description: "Fractional 24x7 Crypto Spot"}
runtime: {mode: BACKTEST, start_time: "2026-01-04T01:30:00Z", end_time: "2026-01-04T02:00:00Z", base_currency: USDT}
market: {profile: GENERIC_24X7_CRYPTO_SPOT}
reference:
  calendars:
    - calendar_id: CRYPTO_24X7
      venue: BINANCE
      timezone: UTC
      sessions: [{name: continuous, opens_at: "00:00:00", closes_at: "23:59:00", session_type: CONTINUOUS}]
      holidays: []
      weekend_days: []
  instruments:
    - instrument_id: BTCUSDT.BINANCE
      asset_class: CRYPTO_SPOT
      base_currency: BTC
      minimum_notional: "1.00"
      timezone: UTC
      trading_calendar_id: CRYPTO_24X7
      price_precision: 2
      quantity_precision: 4
      price_increment: "0.01"
      quantity_increment: "0.0001"
      lot_size: "0.0001"
data:
  bars:
    - {instrument_id: BTCUSDT.BINANCE, ts_event: "2026-01-04T01:31:00Z", ts_init: "2026-01-04T01:31:00Z", sequence: 1, open: "100.00", high: "101.00", low: "99.00", close: "100.00", volume: "10.0000"}
    - {instrument_id: BTCUSDT.BINANCE, ts_event: "2026-01-04T01:32:00Z", ts_init: "2026-01-04T01:32:00Z", sequence: 2, open: "100.00", high: "101.00", low: "99.00", close: "100.00", volume: "10.0000"}
actions:
  - action_id: BUY_CRYPTO
    trigger: {type: ON_BAR_SEQUENCE, sequence: 1}
    command: {type: SUBMIT_ORDER, instrument_id: BTCUSDT.BINANCE, side: BUY, order_type: MARKET, quantity: "0.2500", position_effect: AUTO}
expectations:
  - {assertion_id: CRYPTO_FILLED, fact: ORDER, selector: {action_id: BUY_CRYPTO}, field: status, operator: EQUALS, expected: FILLED}
  - {assertion_id: WEEKEND_PROFILE, fact: PROFILE_TIMELINE, selector: {profile_id: GENERIC_24X7_CRYPTO_SPOT}, operator: EXISTS}
