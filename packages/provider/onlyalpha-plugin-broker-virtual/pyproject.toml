[project]
name = "onlyalpha-plugin-broker-virtual"
version = "0.2.6"
description = "Deterministic simulated Broker plugin for OnlyAlpha"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = ["onlyalpha==0.2.6"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
]

[project.entry-points."onlyalpha.brokers"]
virtual = "onlyalpha_plugin_broker_virtual.factory:OnlyVirtualBrokerFactory"

[dependency-groups]
dev = ["mypy>=1.15", "pytest>=8.4", "pytest-cov>=6", "ruff>=0.11"]

[build-system]
requires = ["hatchling>=1.26,<2"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/onlyalpha_plugin_broker_virtual"]

[tool.uv.sources]
onlyalpha = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["src/onlyalpha_plugin_broker_virtual"]
