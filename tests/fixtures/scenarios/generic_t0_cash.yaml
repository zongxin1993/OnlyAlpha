schema_version: "1"
scenario: {id: GENERIC_T0_CASH_ENGINE, version: "1.0", description: "Fractional T0 cash through OnlyEngine"}
runtime:
  mode: BACKTEST
  start_time: "2026-01-05T01:30:00Z"
  end_time: "2026-01-05T02:00:00Z"
  base_currency: CNY
market: {profile: GENERIC_T0_CASH}
reference:
  calendars:
    - calendar_id: GENERIC
      venue: XSHG
      timezone: UTC
      sessions: [{name: continuous, opens_at: "00:00:00", closes_at: "23:59:00", session_type: CONTINUOUS}]
      holidays: []
  instruments:
    - instrument_id: TEST.XSHG
      asset_class: EQUITY
      timezone: UTC
      trading_calendar_id: GENERIC
      price_precision: 2
      quantity_precision: 2
      price_increment: "0.01"
      quantity_increment: "0.01"
      lot_size: "0.01"
data:
  bars:
    - {instrument_id: TEST.XSHG, ts_event: "2026-01-05T01:31:00Z", ts_init: "2026-01-05T01:31:00Z", sequence: 1, open: "10.00", high: "10.10", low: "9.90", close: "10.05", volume: "100.00"}
    - {instrument_id: TEST.XSHG, ts_event: "2026-01-05T01:32:00Z", ts_init: "2026-01-05T01:32:00Z", sequence: 2, open: "10.05", high: "10.10", low: "9.90", close: "10.05", volume: "100.00"}
actions:
  - action_id: BUY_1
    trigger: {type: ON_BAR_SEQUENCE, sequence: 1}
    command: {type: SUBMIT_ORDER, instrument_id: TEST.XSHG, side: BUY, order_type: MARKET, quantity: "0.25", position_effect: AUTO}
expectations:
  - assertion_id: FILLED
    fact: ORDER
    selector: {action_id: BUY_1}
    field: status
    operator: EQUALS
    expected: FILLED
  - assertion_id: PROFILE_RECORDED
    fact: PROFILE_TIMELINE
    selector: {profile_id: GENERIC_T0_CASH}
    operator: EXISTS
